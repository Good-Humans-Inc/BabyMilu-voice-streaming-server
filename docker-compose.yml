name: current

services:
  mqtt:
    image: eclipse-mosquitto:2.0
    networks:
      default: null
    ports:
      - "1883:1883"
    restart: unless-stopped
    volumes:
      - type: bind
        source: ./mosquitto.conf
        target: /mosquitto/config/mosquitto.conf
        read_only: true

  server:
    build:
      context: .
      dockerfile: Dockerfile-server

    command: ["python", "app.py"]

    working_dir: /opt/xiaozhi-esp32-server

    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcp_sa.json
      GOOGLE_CLOUD_PROJECT: composed-augury-469200-g6
      MQTT_URL: mqtt://mqtt:1883
      OTA_MANIFEST_URL: https://storage.googleapis.com/milu-public/OTA/ota_manifest.json
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      NEXT_STARTER_FETCH_TIMEOUT_SECONDS: ${NEXT_STARTER_FETCH_TIMEOUT_SECONDS:-0.2}
      NEXT_STARTER_DB_TIMEOUT_SECONDS: ${NEXT_STARTER_DB_TIMEOUT_SECONDS:-2.0}
      NEXT_STARTER_MAX_AGE_DAYS: ${NEXT_STARTER_MAX_AGE_DAYS:-7}
      PYTHONUNBUFFERED: "1"
      TZ: America/Los_Angeles

    ports:
      - "8000:8000"
      - "8003:8003"

    restart: unless-stopped
    networks:
      default: null

    volumes:
      # 1) Source code (so code changes apply without rebuild)
      - type: bind
        source: ./main/xiaozhi-server
        target: /opt/xiaozhi-esp32-server

      # 2) Runtime config & data
      - type: bind
        source: ./data
        target: /opt/xiaozhi-esp32-server/data

      # 3) GCP Service Account
      - type: bind
        source: ./data/.gcp/sa.json
        target: /run/secrets/gcp_sa.json
        read_only: true

networks:
  default:
    name: current_default
