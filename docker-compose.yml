name: current

services:
  mqtt:
    image: eclipse-mosquitto:2.0
    ports:
      - "1883:1883"
    restart: unless-stopped
    volumes:
      - type: bind
        source: /srv/dev/current/mosquitto.conf
        target: /mosquitto/config/mosquitto.conf
        read_only: true

  server:
    build:
      context: .
      dockerfile: Dockerfile-server
    command: ["python", "app.py"]
    working_dir: /opt/echoear-ground-server
    environment:
      ECHOEAR_CONFIG_DIR: /opt/echoear-ground-server
      GOOGLE_APPLICATION_CREDENTIALS: /opt/secrets/gcp/sa.json
      GOOGLE_CLOUD_PROJECT: composed-augury-469200-g6
      PYTHONUNBUFFERED: "1"
      TZ: America/Los_Angeles
      CHAT_STORE_BACKEND: ${CHAT_STORE_BACKEND:-auto}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_TIMEOUT_SECONDS: ${SUPABASE_TIMEOUT_SECONDS:-10}
      SUPABASE_USERS_TABLE: ${SUPABASE_USERS_TABLE:-users}
      SUPABASE_MEMORY_READ_MODEL_TABLE: ${SUPABASE_MEMORY_READ_MODEL_TABLE:-memory_read_model}
      ECHOEAR_DEFAULT_DEVICE_ID: ${ECHOEAR_DEFAULT_DEVICE_ID:-}
      ECHOEAR_TTS_PREBUFFER_FRAMES: ${ECHOEAR_TTS_PREBUFFER_FRAMES:-4}
    ports:
      - "8000:8000"
      - "8003:8003"
    restart: unless-stopped
    volumes:
      - type: bind
        source: /srv/dev/ground-up-server
        target: /opt/echoear-ground-server
      - type: bind
        source: /srv/dev/current/data
        target: /opt/echoear-ground-server/data
      - type: bind
        source: /srv/dev/current/data/.gcp/sa.json
        target: /opt/secrets/gcp/sa.json
        read_only: true
    depends_on:
      - mqtt
