name: current

services:
  mqtt:
    image: eclipse-mosquitto:2.0
    networks:
      default: null
    ports:
      - "1883:1883"
    restart: unless-stopped
    volumes:
      - type: bind
        source: /srv/dev/current/mosquitto.conf
        target: /mosquitto/config/mosquitto.conf
        read_only: true
        bind:
          create_host_path: true

  server:
    build:
      context: /srv/dev/current
      dockerfile: Dockerfile-server

    command: ["python", "app.py"]

    working_dir: /opt/xiaozhi-esp32-server

    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /opt/secrets/gcp/sa.json
      GOOGLE_CLOUD_PROJECT: composed-augury-469200-g6
      MQTT_ENDPOINT: 35.188.112.96
      MQTT_URL: mqtt://mqtt:1883
      SERVER_EXTERNAL_IP: 35.188.112.96
      OTA_MANIFEST_URL: https://storage.googleapis.com/milu-public/OTA_MIAO/ota_manifest.json
      CHAT_STORE_BACKEND: ${CHAT_STORE_BACKEND:-auto}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_TIMEOUT_SECONDS: ${SUPABASE_TIMEOUT_SECONDS:-10}
      SUPABASE_USERS_TABLE: ${SUPABASE_USERS_TABLE:-users}
      SUPABASE_SESSIONS_TABLE: ${SUPABASE_SESSIONS_TABLE:-sessions}
      SUPABASE_TURNS_TABLE: ${SUPABASE_TURNS_TABLE:-turns}
      SUPABASE_MEMORY_READ_MODEL_TABLE: ${SUPABASE_MEMORY_READ_MODEL_TABLE:-memory_read_model}
      NEXT_STARTER_FETCH_TIMEOUT_SECONDS: ${NEXT_STARTER_FETCH_TIMEOUT_SECONDS:-0.2}
      NEXT_STARTER_DB_TIMEOUT_SECONDS: ${NEXT_STARTER_DB_TIMEOUT_SECONDS:-2.0}
      NEXT_STARTER_MAX_AGE_DAYS: ${NEXT_STARTER_MAX_AGE_DAYS:-7}
      PYTHONUNBUFFERED: "1"
      TZ: America/Los_Angeles

    ports:
      - "8000:8000"
      - "8003:8003"

    restart: unless-stopped
    networks:
      default: null

    volumes:
      - type: bind
        source: /srv/dev/current/main/xiaozhi-server
        target: /opt/xiaozhi-esp32-server
        bind:
          create_host_path: true

      - type: bind
        source: /srv/dev/current/data
        target: /opt/xiaozhi-esp32-server/data
        bind:
          create_host_path: true

      - type: bind
        source: /srv/dev/current/data/.gcp/sa.json
        target: /opt/secrets/gcp/sa.json
        read_only: true

networks:
  default:
    name: current_default
